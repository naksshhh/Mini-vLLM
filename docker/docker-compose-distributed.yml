version: '3.8'

# Distributed ML Inference Cluster
# Topology: 1 Router + 2 Workers + Prometheus + Grafana
#
# Start:
#   docker-compose -f docker/docker-compose-distributed.yml up --build -d
#
# Router (send all requests here): http://localhost:8080
# Worker stats:                    http://localhost:8080/stats
# Prometheus:                      http://localhost:9090
# Grafana:                         http://localhost:3000

services:
  worker_1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - MODEL_NAME=gpt2
      - WORKER_ID=worker-1
      - WORKER_PORT=8001
    command: ["python", "-m", "distributed.worker", "--port", "8001", "--worker-id", "worker-1"]
    ports:
      - "8001:8001"

  worker_2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - MODEL_NAME=gpt2
      - WORKER_ID=worker-2
      - WORKER_PORT=8002
    command: ["python", "-m", "distributed.worker", "--port", "8002", "--worker-id", "worker-2"]
    ports:
      - "8002:8002"

  router:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - MODEL_NAME=gpt2
    command: >
      python -m distributed.router
      --workers http://worker_1:8001 http://worker_2:8002
      --port 8080
    ports:
      - "8080:8080"
    depends_on:
      - worker_1
      - worker_2

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
